name: Build Switch Printer NRO

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkita64:latest
      options: --user root

    steps:
      - uses: actions/checkout@v4

      - name: Test Toolchain
        run: |
          export DEVKITPRO=/opt/devkitpro
          export PATH="$DEVKITPRO/devkitA64/bin:$DEVKITPRO/tools/bin:$PATH"
          echo "=== Tools ==="
          aarch64-none-elf-gcc --version 2>&1 | head -1 || echo "GCC FAILED"
          nacptool 2>&1 | head -3 || echo "NACP expected help msg, this is OK"
          elf2nro 2>&1 | head -3 || echo "ELF2NRO expected help msg, this is OK"
          echo "=== libnx ==="
          ls /opt/devkitpro/libnx/include/switch.h 2>&1 || echo "No switch.h"
          echo "=== Test Compile ==="
          echo "int main(){return 0;}" > /tmp/test.c
          aarch64-none-elf-gcc -c /tmp/test.c -o /tmp/test.o 2>&1 && echo "COMPILE OK" || echo "COMPILE FAIL"

      - name: Full Build
        run: |
          export DEVKITPRO=/opt/devkitpro
          export PATH="$DEVKITPRO/devkitA64/bin:$DEVKITPRO/tools/bin:$PATH"
          make clean 2>/dev/null || true
          make 2>&1 || echo "MAKE_EXIT=FAILED"
          echo "=== Files ==="
          find build/ -type f 2>/dev/null || echo "No build dir"

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: switch-printer-nro
          path: build/switch_printer.nro