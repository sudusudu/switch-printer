name: Build Switch Printer NRO

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkita64:20250201
      options: --user root

    steps:
      - uses: actions/checkout@v4

      - name: Diagnose build environment
        shell: bash
        run: |
          set +e
          export DEVKITPRO=/opt/devkitpro
          INC="$DEVKITPRO/libnx/include/switch"
          echo "=== Header files ==="
          ls "$INC/"*.h 2>/dev/null | head -30 || echo "(not found)"
          echo ""
          echo "=== Toolchain ==="
          aarch64-none-elf-gcc --version 2>/dev/null | head -1 || echo "(not found)"
          set -e

      - name: Build
        shell: bash
        run: |
          export DEVKITPRO=/opt/devkitpro
          export PATH="$DEVKITPRO/devkitA64/bin:$DEVKITPRO/tools/bin:$PATH"
          make clean 2>/dev/null || true
          make 2>&1

      - name: Upload NRO artifact
        uses: actions/upload-artifact@v4
        with:
          name: switch_printer
          path: build/switch_printer.nro
          if-no-files-found: error
