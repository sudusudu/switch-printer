name: Build Switch Printer NRO

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkita64:latest
      options: --user root

    steps:
      - uses: actions/checkout@v4

      - name: Check libnx headers
        run: |
          export DEVKITPRO=/opt/devkitpro
          echo "=== HID grep ==="
          grep -rl "KEY_PLUS\|hidScanInput\|CONTROLLER_P1" $DEVKITPRO/libnx/include/ 2>/dev/null | head -5
          echo "=== Available HID constants ==="
          grep -h "KEY_PLUS\|hidScanInput" $DEVKITPRO/libnx/include/switch.h 2>/dev/null | head -5
          echo "=== All switch sub-headers ==="
          ls $DEVKITPRO/libnx/include/switch/ 2>/dev/null | head -30

      - name: Build NRO
        run: |
          export DEVKITPRO=/opt/devkitpro
          export PATH="$DEVKITPRO/devkitA64/bin:$DEVKITPRO/tools/bin:$PATH"
          make 2>&1
          ls -la build/

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: switch-printer-nro
          path: build/switch_printer.nro