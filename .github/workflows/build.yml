name: Build Switch Printer NRO

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkita64:latest
      options: --user root

    steps:
      - uses: actions/checkout@v4

      - name: Diagnose input API
        run: |
          export DEVKITPRO=/opt/devkitpro
          INC="$DEVKITPRO/libnx/include/switch"
          echo "=== Search for ScanInput/KeysDown/padUpdate ==="
          grep -rn "ScanInput\|KeysDown\|padUpdate\|padConfigure\|padInitialize\|GetButtons" "$INC" --include="*.h" | grep -v ".git" | head -40
          echo ""
          echo "=== hiddbg functions ==="
          grep -rn "hiddbg" "$INC/services" --include="*.h" | grep "Result\|void\|u64" | head -20
          echo ""
          echo "=== All header files ==="
          ls "$INC/"*.h | head -30
          echo ""
          echo "=== applet headers ==="
          ls "$INC/applets/" 2>/dev/null | head -20
          echo "=== kernel headers ==="
          ls "$INC/kernel/" 2>/dev/null | head -20

      - name: Build
        run: |
          export DEVKITPRO=/opt/devkitpro
          export PATH="$DEVKITPRO/devkitA64/bin:$DEVKITPRO/tools/bin:$PATH"
          make clean 2>/dev/null || true
          make 2>&1

      - name: Upload NRO artifact
        uses: actions/upload-artifact@v4
        with:
          name: switch_printer
          path: build/switch_printer.nro
          if-no-files-found: error
