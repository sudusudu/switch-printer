name: Build Switch Printer NRO

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install devkitPro
        run: |
          wget -q https://github.com/devkitPro/pacman/releases/download/v1.0.2/devkitpro-pacman.amd64.deb
          sudo dpkg -i devkitpro-pacman.amd64.deb 2>/dev/null || true
          sudo apt-get install -f -y
          sudo dkp-pacman -S --noconfirm --needed switch-dev 2>&1 | tail -5
          echo "Install done"

      - name: Build NRO
        run: |
          export DEVKITPRO=/opt/devkitpro
          export PATH="$DEVKITPRO/devkitA64/bin:$DEVKITPRO/tools/bin:$PATH"
          make 2>&1
          ls -la build/ 2>/dev/null && echo "BUILD OK" || echo "BUILD FAILED"

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: switch-printer-nro
          path: build/switch_printer.nro