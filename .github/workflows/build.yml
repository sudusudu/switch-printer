name: Build Switch Printer NRO

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkita64:latest
      options: --user root

    steps:
      - uses: actions/checkout@v4

      - name: Setup and Build
        run: |
          export DEVKITPRO=/opt/devkitpro
          export PATH="$DEVKITPRO/devkitA64/bin:$DEVKITPRO/tools/bin:$PATH"

          echo "=== Tool Check ==="
          which aarch64-none-elf-gcc
          aarch64-none-elf-gcc --version | head -1
          which nacptool
          which elf2nro
          echo "DEVKITPRO=$DEVKITPRO"
          ls $DEVKITPRO/libnx/

          echo "=== Building ==="
          make -j$(nproc) V=1 2>&1

          echo "=== Result ==="
          ls -la build/

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: switch-printer-nro
          path: build/switch_printer.nro