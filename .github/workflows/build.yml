name: Build Switch Printer NRO

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkita64:latest
      options: --user root

    steps:
      - uses: actions/checkout@v4

      - name: Dump USB struct
        run: |
          export DEVKITPRO=/opt/devkitpro
          echo "=== UsbHsInterface ==="
          cat $DEVKITPRO/libnx/include/switch/services/usbhs.h 2>/dev/null | head -200
          echo "=== grep inf / pathstr / device ==="
          grep -n "inf;\|pathstr\|device" $DEVKITPRO/libnx/include/switch/services/usbhs.h 2>/dev/null | head -30

      - name: Build
        run: |
          export DEVKITPRO=/opt/devkitpro
          export PATH="$DEVKITPRO/devkitA64/bin:$DEVKITPRO/tools/bin:$PATH"
          make 2>&1 | head -30