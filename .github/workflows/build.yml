name: Build Switch Printer NRO

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkita64:latest
      options: --user root

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          export DEVKITPRO=/opt/devkitpro
          export PATH="$DEVKITPRO/devkitA64/bin:$DEVKITPRO/tools/bin:$PATH"
          set -e

          echo "DEVKITPRO=$DEVKITPRO"
          echo "CC=$(which aarch64-none-elf-gcc 2>/dev/null || echo NOT_FOUND)"
          echo "nacptool=$(which nacptool 2>/dev/null || echo NOT_FOUND)"
          echo "elf2nro=$(which elf2nro 2>/dev/null || echo NOT_FOUND)"
          ls /opt/devkitpro/libnx/ 2>/dev/null | head -15

          make -j2 2>&1

          echo "---BUILD OUTPUT---"
          ls -la build/

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: switch-printer-nro
          path: build/switch_printer.nro